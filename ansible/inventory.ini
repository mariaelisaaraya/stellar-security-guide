# =============================================================================
#  inventory.ini  -  List of servers where the playbook will be applied
#
#  BEFORE RUNNING THE PLAYBOOK:
#  1) Replace 123.45.67.89 below with your server's actual IP address.
#  2) The first time, connect as root (or the initial user your VPS
#     provider gave you). After the playbook runs, use the admin user.
#  3) If your provider gives you a non-root user, change ansible_user.
#
#  Example for multiple nodes:
#    node1 ansible_host=1.2.3.4
#    node2 ansible_host=5.6.7.8
# =============================================================================

[stellar_nodes]
node1 ansible_host=123.45.67.89   # <-- CHANGE THIS to your server's IP

[stellar_nodes:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# If you change the SSH port AFTER running the playbook, on the next run
# you must add:  ansible_port=2222
